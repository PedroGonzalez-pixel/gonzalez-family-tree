<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frise Historique – Famille Gonzalez</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f5f7;
      --surface: #ffffff;
      --border: #e0e0e5;
      --text: #1d1d1f;
      --muted: #6e6e73;
      --accent: #0071e3;
      --accent-hover: #0077ed;
      --deceased: #8e8e93;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 2px 20px rgba(0,0,0,0.06);
      --line: #d0d0d8;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* TOPBAR */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px; height: 56px; gap: 12px;
    }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .topbar h1 { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 500; }
    .btn-back {
      display: flex; align-items: center; gap: 6px;
      font-size: 14px; color: var(--accent); text-decoration: none;
      padding: 6px 10px; border-radius: var(--radius-sm); transition: background 0.15s;
    }
    .btn-back:hover { background: rgba(0,113,227,0.08); }
    .topbar-right { display: flex; align-items: center; gap: 10px; }

    .lang-switcher {
      display: flex; background: var(--bg);
      border: 1px solid var(--border); border-radius: 20px; padding: 3px; gap: 2px;
    }
    .lang-btn {
      border: none; background: transparent; padding: 4px 10px; border-radius: 16px;
      font-size: 11px; font-weight: 500; cursor: pointer; color: var(--muted); transition: all 0.2s;
    }
    .lang-btn.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }

    .btn-export {
      display: flex; align-items: center; gap: 6px;
      background: var(--accent); color: white; border: none;
      padding: 7px 16px; border-radius: 20px; font-size: 13px;
      font-weight: 500; cursor: pointer; transition: background 0.15s;
      font-family: 'DM Sans', sans-serif;
    }
    .btn-export:hover { background: var(--accent-hover); }

    .btn-logout {
      border: 1px solid var(--border); background: transparent;
      padding: 6px 14px; border-radius: 20px; font-size: 13px;
      color: var(--muted); cursor: pointer; transition: all 0.15s;
      font-family: 'DM Sans', sans-serif;
    }
    .btn-logout:hover { background: var(--bg); color: var(--text); }

    /* MAIN */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    .page-header {
      margin-bottom: 48px;
    }
    .page-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 32px; font-weight: 500;
      margin-bottom: 8px;
    }
    .page-header p {
      font-size: 14px; color: var(--muted);
    }

    /* LOADING */
    .loading {
      display: flex; align-items: center; justify-content: center;
      height: 200px; color: var(--muted); font-size: 15px;
    }

    /* FRISE */
    .timeline {
      position: relative;
      padding-left: 32px;
    }

    /* Ligne verticale centrale */
    .timeline::before {
      content: '';
      position: absolute;
      left: 7px; top: 8px; bottom: 0;
      width: 2px;
      background: linear-gradient(to bottom, var(--accent) 0%, var(--line) 100%);
      border-radius: 1px;
    }

    /* YEAR MARKER */
    .year-marker {
      position: relative;
      margin-bottom: 8px;
      margin-top: 32px;
    }
    .year-marker:first-child { margin-top: 0; }
    .year-marker .year-label {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: 'Playfair Display', serif;
      font-size: 22px; font-weight: 500;
      color: var(--text);
      margin-left: -32px;
      padding-left: 4px;
    }
    .year-dot {
      width: 16px; height: 16px; border-radius: 50%;
      background: var(--accent);
      border: 3px solid var(--bg);
      box-shadow: 0 0 0 2px var(--accent);
      flex-shrink: 0;
    }

    /* EVENT CARD */
    .event-card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 10px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: flex-start;
      gap: 16px;
      transition: border-color 0.2s, transform 0.15s;
      animation: fadeIn 0.4s ease forwards;
      opacity: 0;
    }
    .event-card:hover {
      border-color: var(--accent);
      transform: translateX(3px);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* Connecteur vers la ligne */
    .event-card::before {
      content: '';
      position: absolute;
      left: -24px; top: 50%;
      transform: translateY(-50%);
      width: 16px; height: 1px;
      background: var(--line);
    }

    .event-icon {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
      background: var(--bg);
      border: 1px solid var(--border);
    }
    .event-icon.birth { background: #e8f5e9; border-color: #a5d6a7; }
    .event-icon.death { background: #f3f3f5; border-color: #c0c0c8; }

    .event-content { flex: 1; min-width: 0; }
    .event-name {
      font-size: 15px; font-weight: 500; color: var(--text);
      margin-bottom: 2px;
    }
    .event-name.deceased { color: var(--deceased); }
    .event-detail {
      font-size: 13px; color: var(--muted);
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .event-type-badge {
      font-size: 11px; font-weight: 500;
      padding: 2px 8px; border-radius: 10px;
      background: var(--bg); color: var(--muted);
      border: 1px solid var(--border);
    }
    .event-type-badge.birth { background: #e8f5e9; color: #2e7d32; border-color: #a5d6a7; }
    .event-type-badge.death { background: #f3f3f5; color: #6e6e73; border-color: #c0c0c8; }

    .cross-icon {
      font-size: 14px;
      color: var(--deceased);
      margin-left: 4px;
    }

    /* EMPTY */
    .empty-state {
      text-align: center; padding: 60px 20px;
      color: var(--muted); font-size: 15px;
    }

    @media (max-width: 600px) {
      .topbar { padding: 0 16px; }
      .topbar h1 { display: none; }
      main { padding: 32px 16px 60px; }
    }

    @media print {
      .topbar { display: none; }
      .event-card { break-inside: avoid; animation: none; opacity: 1; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <a href="dashboard.html" class="btn-back">
        <svg width="7" height="12" viewBox="0 0 7 12" fill="none">
          <path d="M6 1L1 6l5 5" stroke="#0071e3" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span data-i18n="back">Retour</span>
      </a>
      <h1 data-i18n="title">Frise Historique</h1>
    </div>
    <div class="topbar-right">
      <div class="lang-switcher">
        <button class="lang-btn active" onclick="setLang('fr')">FR</button>
        <button class="lang-btn" onclick="setLang('en')">EN</button>
        <button class="lang-btn" onclick="setLang('es')">ES</button>
      </div>
      <button class="btn-export" id="exportBtn">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M7 1v8M4 6l3 3 3-3M1 10v1a2 2 0 002 2h8a2 2 0 002-2v-1" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span data-i18n="export">Exporter PDF</span>
      </button>
      <button class="btn-logout" id="logoutBtn" data-i18n="logout">Déconnexion</button>
    </div>
  </header>

  <main>
    <div class="page-header">
      <h2 data-i18n="pageTitle">Frise Chronologique</h2>
      <p data-i18n="pageSubtitle">Histoire de la famille à travers les générations</p>
    </div>
    <div class="loading" id="loadingMsg">Chargement...</div>
    <div id="timeline-container" style="display:none;"></div>
  </main>

  <script src="js/firebase-init.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/timeline.js"></script>
  <script>
    // ── TRADUCTIONS ───────────────────────────────────────────
    const i18n = {
      fr: {
        back: "Retour", title: "Frise Historique", logout: "Déconnexion",
        export: "Exporter PDF", pageTitle: "Frise Chronologique",
        pageSubtitle: "Histoire de la famille à travers les générations",
        born: "Naissance", died: "Décès", loading: "Chargement...",
        age: "ans", noData: "Aucune personne avec des dates enregistrées."
      },
      en: {
        back: "Back", title: "Family Timeline", logout: "Sign out",
        export: "Export PDF", pageTitle: "Family Timeline",
        pageSubtitle: "Family history through the generations",
        born: "Born", died: "Died", loading: "Loading...",
        age: "years old", noData: "No persons with dates found."
      },
      es: {
        back: "Volver", title: "Línea de Tiempo", logout: "Cerrar sesión",
        export: "Exportar PDF", pageTitle: "Línea de Tiempo",
        pageSubtitle: "Historia familiar a través de las generaciones",
        born: "Nacimiento", died: "Fallecimiento", loading: "Cargando...",
        age: "años", noData: "No hay personas con fechas registradas."
      }
    };

    let currentLang = localStorage.getItem("lang") || "fr";

    function setLang(lang) {
      currentLang = lang;
      localStorage.setItem("lang", lang);
      document.querySelectorAll(".lang-btn").forEach(btn =>
        btn.classList.toggle("active", btn.textContent === lang.toUpperCase())
      );
      document.querySelectorAll("[data-i18n]").forEach(el => {
        const k = el.getAttribute("data-i18n");
        if (i18n[lang][k]) el.textContent = i18n[lang][k];
      });
      // Re-render si les données sont chargées
      if (window._timelineData) renderTimeline(window._timelineData);
    }

    setLang(currentLang);

    document.getElementById("logoutBtn").addEventListener("click", () =>
      firebase.auth().signOut().then(() => window.location.href = "index.html")
    );

    document.getElementById("exportBtn").addEventListener("click", exportPDF);

    function exportPDF() {
      window.print();
    }
  </script>
</body>
</html>
