<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard – Famille Gonzalez</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- Firebase v8 -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
</head>
<body>

  <header class="topbar">
    <h1>Famille Gonzalez</h1>
    <button id="logoutBtn" class="btn">Déconnexion</button>
  </header>

  <main class="grid">
    <a href="tree.html" class="card">🌳 Arbre Généalogique</a>
    <a href="gallery.html" class="card">📸 Galerie</a>
    <a href="timeline.html" class="card">🕒 Frise Historique</a>
    <a href="edit.html" class="card">➕ Ajouter une personne</a>
  </main>

  <!-- Scripts APRÈS le HTML -->
  <script src="js/firebase-init.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.getElementById("logoutBtn").addEventListener("click", function() {
      firebase.auth().signOut().then(function() {
        window.location.href = "index.html";
      });
    });
  </script>

</body>
</html>
