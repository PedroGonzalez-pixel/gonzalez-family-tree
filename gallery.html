<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trombinoscope – Famille Gonzalez</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f5f7;
      --surface: #ffffff;
      --border: #e0e0e5;
      --text: #1d1d1f;
      --muted: #6e6e73;
      --accent: #0071e3;
      --accent-hover: #0077ed;
      --radius: 16px;
      --radius-sm: 8px;
      --shadow: 0 2px 20px rgba(0,0,0,0.06);
      --shadow-hover: 0 8px 32px rgba(0,0,0,0.12);
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* TOPBAR */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px; height: 56px;
    }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .topbar h1 { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 500; }
    .btn-back {
      display: flex; align-items: center; gap: 6px;
      font-size: 14px; color: var(--accent); text-decoration: none;
      padding: 6px 10px; border-radius: var(--radius-sm); transition: background 0.15s;
    }
    .btn-back:hover { background: rgba(0,113,227,0.08); }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .lang-switcher {
      display: flex; background: var(--bg);
      border: 1px solid var(--border); border-radius: 20px; padding: 3px; gap: 2px;
    }
    .lang-btn {
      border: none; background: transparent; padding: 4px 10px; border-radius: 16px;
      font-size: 11px; font-weight: 500; cursor: pointer; color: var(--muted); transition: all 0.2s;
    }
    .lang-btn.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    .btn-logout {
      border: 1px solid var(--border); background: transparent;
      padding: 6px 14px; border-radius: 20px; font-size: 13px;
      color: var(--muted); cursor: pointer; transition: all 0.15s;
      font-family: 'DM Sans', sans-serif;
    }
    .btn-logout:hover { background: var(--bg); color: var(--text); }

    /* MAIN */
    main { max-width: 1100px; margin: 0 auto; padding: 48px 24px 80px; }

    .page-header { margin-bottom: 40px; }
    .page-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 32px; font-weight: 500; margin-bottom: 8px;
    }
    .page-header p { font-size: 14px; color: var(--muted); }

    /* COMPTEUR */
    .count-badge {
      display: inline-flex; align-items: center;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 4px 14px; margin-top: 12px;
      font-size: 13px; color: var(--muted);
    }
    .count-badge strong { color: var(--text); margin-right: 4px; }

    /* LOADING */
    .loading {
      display: flex; align-items: center; justify-content: center;
      height: 300px; color: var(--muted); font-size: 15px;
    }

    /* GRID */
    .trombi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 20px;
    }

    /* CARD */
    .person-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      text-decoration: none;
      color: var(--text);
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
      box-shadow: var(--shadow);
      display: flex; flex-direction: column;
      animation: fadeUp 0.4s ease forwards;
      opacity: 0;
    }
    .person-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
      border-color: var(--accent);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* PHOTO */
    .card-photo {
      width: 100%;
      aspect-ratio: 1;
      background: var(--bg);
      background-size: cover;
      background-position: center top;
      position: relative;
      overflow: hidden;
    }

    /* Badge décédé */
    .deceased-badge {
      position: absolute;
      bottom: 8px; right: 8px;
      background: rgba(0,0,0,0.5);
      color: white;
      font-size: 14px;
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(4px);
    }

    /* INFOS */
    .card-info {
      padding: 14px 14px 16px;
    }
    .card-name {
      font-size: 14px; font-weight: 500;
      line-height: 1.3; margin-bottom: 4px;
      color: var(--text);
    }
    .card-name.deceased { color: var(--muted); }
    .card-detail {
      font-size: 12px; color: var(--muted);
    }

    /* EMPTY */
    .empty-state {
      grid-column: 1/-1;
      text-align: center; padding: 80px 20px;
      color: var(--muted); font-size: 15px;
    }
    .empty-icon { font-size: 48px; margin-bottom: 16px; }

    @media (max-width: 600px) {
      .topbar { padding: 0 16px; }
      .topbar h1 { display: none; }
      main { padding: 32px 16px 60px; }
      .trombi-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 14px; }
    }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="topbar-left">
      <a href="dashboard.html" class="btn-back">
        <svg width="7" height="12" viewBox="0 0 7 12" fill="none">
          <path d="M6 1L1 6l5 5" stroke="#0071e3" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span data-i18n="back">Retour</span>
      </a>
      <h1 data-i18n="title">Trombinoscope</h1>
    </div>
    <div class="topbar-right">
      <div class="lang-switcher">
        <button class="lang-btn active" onclick="setLang('fr')">FR</button>
        <button class="lang-btn" onclick="setLang('en')">EN</button>
        <button class="lang-btn" onclick="setLang('es')">ES</button>
      </div>
      <button class="btn-logout" id="logoutBtn" data-i18n="logout">Déconnexion</button>
    </div>
  </header>

  <main>
    <div class="page-header">
      <h2 data-i18n="pageTitle">La Famille</h2>
      <p data-i18n="pageSubtitle">Portraits de la famille Gonzalez</p>
      <div class="count-badge" id="countBadge" style="display:none;">
        <strong id="countNum">0</strong>
        <span data-i18n="members">membres</span>
      </div>
    </div>
    <div class="loading" id="loadingMsg">Chargement...</div>
    <div class="trombi-grid" id="trombiGrid" style="display:none;"></div>
  </main>

  <script src="js/firebase-init.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/gallery.js"></script>
  <script>
    const i18n = {
      fr: {
        back: "Retour", title: "Trombinoscope", logout: "Déconnexion",
        pageTitle: "La Famille", pageSubtitle: "Portraits de la famille Gonzalez",
        members: "membres", born: "Né(e) en", died: "† ",
        noPhoto: "Aucune photo enregistrée pour le moment.",
        age: "ans"
      },
      en: {
        back: "Back", title: "Family portraits", logout: "Sign out",
        pageTitle: "The Family", pageSubtitle: "Gonzalez family portraits",
        members: "members", born: "Born in", died: "† ",
        noPhoto: "No photos registered yet.",
        age: "years old"
      },
      es: {
        back: "Volver", title: "Directorio", logout: "Cerrar sesión",
        pageTitle: "La Familia", pageSubtitle: "Retratos de la familia Gonzalez",
        members: "miembros", born: "Nacido/a en", died: "† ",
        noPhoto: "Aún no hay fotos registradas.",
        age: "años"
      }
    };

    let currentLang = localStorage.getItem("lang") || "fr";

    function setLang(lang) {
      currentLang = lang;
      localStorage.setItem("lang", lang);
      document.querySelectorAll(".lang-btn").forEach(btn =>
        btn.classList.toggle("active", btn.textContent === lang.toUpperCase())
      );
      document.querySelectorAll("[data-i18n]").forEach(el => {
        const k = el.getAttribute("data-i18n");
        if (i18n[lang][k]) el.textContent = i18n[lang][k];
      });
      if (window._galleryData) renderGallery(window._galleryData);
    }

    setLang(currentLang);

    document.getElementById("logoutBtn").addEventListener("click", () =>
      firebase.auth().signOut().then(() => window.location.href = "index.html")
    );
  </script>
</body>
</html>
