<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arbre Généalogique – Famille Gonzalez</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f5f7; --surface: #ffffff; --border: #e0e0e5;
      --text: #1d1d1f; --muted: #6e6e73; --accent: #0071e3; --accent-hover: #0077ed;
      --radius-sm: 8px;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* TOPBAR */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px; height: 56px; gap: 8px;
    }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .topbar h1 { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 500; }
    .btn-back {
      display: flex; align-items: center; gap: 6px; font-size: 14px;
      color: var(--accent); text-decoration: none;
      padding: 6px 10px; border-radius: var(--radius-sm); transition: background 0.15s;
    }
    .btn-back:hover { background: rgba(0,113,227,0.08); }
    .topbar-right { display: flex; align-items: center; gap: 8px; }
    .lang-switcher {
      display: flex; background: var(--bg);
      border: 1px solid var(--border); border-radius: 20px; padding: 3px; gap: 2px;
    }
    .lang-btn {
      border: none; background: transparent; padding: 4px 9px; border-radius: 16px;
      font-size: 11px; font-weight: 500; cursor: pointer; color: var(--muted); transition: all 0.2s;
    }
    .lang-btn.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }

    .btn-action {
      display: flex; align-items: center; gap: 5px;
      border: 1px solid var(--border); background: var(--surface);
      padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 500;
      color: var(--text); cursor: pointer; transition: all 0.15s; white-space: nowrap;
      font-family: 'DM Sans', sans-serif;
    }
    .btn-action:hover { background: var(--bg); border-color: var(--accent); color: var(--accent); }
    .btn-action.pdf { background: var(--accent); color: white; border-color: var(--accent); }
    .btn-action.pdf:hover { background: var(--accent-hover); }

    .btn-logout {
      border: 1px solid var(--border); background: transparent;
      padding: 6px 12px; border-radius: 20px; font-size: 12px;
      color: var(--muted); cursor: pointer; transition: all 0.15s; white-space: nowrap;
      font-family: 'DM Sans', sans-serif;
    }
    .btn-logout:hover { background: var(--bg); color: var(--text); }

    #tree-container {
      width: 100%; height: calc(100vh - 56px); overflow: hidden;
      cursor: grab;
    }
    #tree-container:active { cursor: grabbing; }

    .loading {
      display: flex; align-items: center; justify-content: center;
      height: calc(100vh - 56px); color: var(--muted); font-size: 15px;
    }

    @media (max-width: 600px) {
      .topbar { padding: 0 12px; }
      .topbar h1 { display: none; }
    }

    @media print {
      .topbar { display: none !important; }
      #tree-container { height: 100vh; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <a href="dashboard.html" class="btn-back">
        <svg width="7" height="12" viewBox="0 0 7 12" fill="none">
          <path d="M6 1L1 6l5 5" stroke="#0071e3" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span data-i18n="back">Retour</span>
      </a>
      <h1 data-i18n="title">Arbre Généalogique</h1>
    </div>
    <div class="topbar-right">
      <div class="lang-switcher">
        <button class="lang-btn active" onclick="setLang('fr')">FR</button>
        <button class="lang-btn" onclick="setLang('en')">EN</button>
        <button class="lang-btn" onclick="setLang('es')">ES</button>
      </div>
      <!-- Recentrer -->
      <button class="btn-action" id="btnCenter" title="Recentrer">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <circle cx="7" cy="7" r="2.5" stroke="currentColor" stroke-width="1.4"/>
          <path d="M7 1v2M7 11v2M1 7h2M11 7h2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        <span data-i18n="center">Recentrer</span>
      </button>
      <!-- Export PDF -->
      <button class="btn-action pdf" onclick="window.print()">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
          <path d="M6.5 1v7M4 5.5l2.5 2.5L9 5.5M1 10v1a1 1 0 001 1h9a1 1 0 001-1v-1" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        PDF
      </button>
      <button class="btn-logout" id="logoutBtn" data-i18n="logout">Déconnexion</button>
    </div>
  </header>

  <div class="loading" id="loadingMsg">Chargement de l'arbre...</div>
  <div id="tree-container" style="display:none;"></div>

  <script src="js/firebase-init.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/tree.js"></script>
  <script>
    const i18n = {
      fr: { back:"Retour", title:"Arbre Généalogique", logout:"Déconnexion", center:"Recentrer" },
      en: { back:"Back",   title:"Family Tree",        logout:"Sign out",    center:"Reset view" },
      es: { back:"Volver", title:"Árbol Genealógico",  logout:"Cerrar sesión", center:"Centrar" }
    };

    let currentLang = localStorage.getItem("lang") || "fr";

    function setLang(lang) {
      currentLang = lang;
      localStorage.setItem("lang", lang);
      document.querySelectorAll(".lang-btn").forEach(btn =>
        btn.classList.toggle("active", btn.textContent === lang.toUpperCase())
      );
      document.querySelectorAll("[data-i18n]").forEach(el => {
        const k = el.getAttribute("data-i18n");
        if (i18n[lang][k]) el.textContent = i18n[lang][k];
      });
    }

    setLang(currentLang);

    document.getElementById("logoutBtn").addEventListener("click", () =>
      firebase.auth().signOut().then(() => window.location.href = "index.html")
    );

    // Bouton recentrer — appelle la fonction exposée par tree.js
    document.getElementById("btnCenter").addEventListener("click", () => {
      if (window.treeResetView) window.treeResetView();
    });
  </script>
</body>
</html>
