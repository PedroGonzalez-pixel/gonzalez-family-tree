<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Famille Gonzalez</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f5f7; --surface: #ffffff; --border: #e0e0e5;
      --text: #1d1d1f; --muted: #6e6e73; --accent: #0071e3;
      --radius: 16px; --radius-sm: 8px;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lang-bar {
      position: fixed;
      top: 16px;
      right: 20px;
      display: flex;
      background: white;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px;
      gap: 2px;
    }
    .lang-btn {
      border: none; background: transparent;
      padding: 4px 12px; border-radius: 16px;
      font-size: 12px; font-weight: 500;
      cursor: pointer; color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
    }
    .lang-btn.active {
      background: var(--bg);
      color: var(--text);
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    .card {
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 4px 40px rgba(0,0,0,0.07);
    }

    .family-icon {
      font-size: 40px;
      margin-bottom: 20px;
      display: block;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 500;
      line-height: 1.3;
      margin-bottom: 8px;
      color: var(--text);
    }

    .subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 36px;
    }

    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 14px 20px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-google:hover { background: #0077ed; }
    .btn-google:active { transform: scale(0.98); }

    .google-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .footer-note {
      margin-top: 24px;
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>
<body>

  <div class="lang-bar">
    <button class="lang-btn active" onclick="setLang('fr')">FR</button>
    <button class="lang-btn" onclick="setLang('es')">ES</button>
    <button class="lang-btn" onclick="setLang('en')">EN</button>
  </div>

  <div class="card">
    <span class="family-icon">🌳</span>
    <h1 data-i18n="title">Arbre Généalogique<br>Famille Gonzalez</h1>
    <p class="subtitle" data-i18n="subtitle">Espace privé réservé à la famille</p>
    <button id="googleLogin" class="btn-google">
      <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#ffffff" opacity="0.9"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#ffffff" opacity="0.9"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#ffffff" opacity="0.9"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#ffffff" opacity="0.9"/>
      </svg>
      <span data-i18n="loginBtn">Se connecter avec Google</span>
    </button>
    <p class="footer-note" data-i18n="note">Accès réservé aux membres autorisés</p>
  </div>

  <script src="js/firebase-init.js"></script>
  <script src="js/auth.js"></script>
  <script>
    const i18n = {
      fr: {
        title: "Arbre Généalogique\nFamille Gonzalez",
        subtitle: "Espace privé réservé à la famille",
        loginBtn: "Se connecter avec Google",
        note: "Accès réservé aux membres autorisés"
      },
      es: {
        title: "Árbol Genealógico\nFamilia Gonzalez",
        subtitle: "Espacio privado reservado a la familia",
        loginBtn: "Iniciar sesión con Google",
        note: "Acceso reservado a los miembros autorizados"
      },
      en: {
        title: "Family Tree\nGonzalez Family",
        subtitle: "Private space reserved for family",
        loginBtn: "Sign in with Google",
        note: "Access restricted to authorized members"
      }
    };

    let currentLang = localStorage.getItem("lang") || "fr";

    function setLang(lang) {
      currentLang = lang;
      localStorage.setItem("lang", lang);
      document.querySelectorAll(".lang-btn").forEach(btn => {
        btn.classList.toggle("active", btn.textContent === lang.toUpperCase());
      });
      applyTranslations();
    }

    function applyTranslations() {
      const t = i18n[currentLang];
      document.querySelectorAll("[data-i18n]").forEach(el => {
        const key = el.getAttribute("data-i18n");
        if(!t[key]) return;
        if(key === "title") {
          el.innerHTML = t[key].replace("\n", "<br>");
        } else {
          el.textContent = t[key];
        }
      });
    }

    setLang(currentLang);

    document.getElementById("logoutBtn") && document.getElementById("logoutBtn").addEventListener("click", function() {
      firebase.auth().signOut().then(() => { window.location.href = "index.html"; });
    });
  </script>

</body>
</html>
